<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 - Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            color: #333;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        figure {
            margin: 0;
            text-align: center;
        }
        figure img {
            width: 100%;
            border-radius: 8px;
        }
        figcaption {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Photo Gallery</h1>

    <div class="gallery">

        <figure>
            <img src="https://placehold.co/300x200" alt="Placeholder image 1">
            <figcaption>Nairobi Skyline</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/300x200" alt="Placeholder image 2">
            <figcaption>Coding Setup</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/300x200" alt="Placeholder image 3">
            <figcaption>Industrial Area</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/300x200" alt="Placeholder image 4">
            <figcaption>GTA Vice City</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/300x200" alt="Placeholder image 5">
            <figcaption>Juice WRLD Concert</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/300x200" alt="Placeholder image 6">
            <figcaption>We Can Academy</figcaption>
        </figure>

    </div>

</body>
</html>
